<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefan Gheorghe</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 400px;
        }
        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
        }
        h1 { margin: 0.5rem 0; font-size: 1.8rem; }
        p { color: #6c757d; font-size: 1rem; line-height: 1.5; }
        .links { margin-top: 1.5rem; }
        .btn {
            display: inline-block;
            background: #24292e;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="Stefan Gheorghe">
    <h1>Stefan Gheorghe</h1>
    <p>Software Engineer & Architect. Algorithms, Data Structures, and AI enthusiast.</p>
    
    <div class="links">
        <a href="https://github.com/gheorghe-stefan" class="btn" target="_blank">GitHub Profile</a>
    </div>
</div>

</body>
</html>
